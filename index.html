<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花都区新盘销控表</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:#f4f6f9;color:#222;font-size:14px}
header{position:sticky;top:0;z-index:20;background:#1f6feb;color:#fff;padding:10px 14px;box-shadow:0 2px 6px rgba(0,0,0,.15)}
header h1{margin:0;font-size:17px;font-weight:600}
header .sub{font-size:11px;opacity:.85;margin-top:2px}
.bar{position:sticky;top:52px;z-index:15;background:#fff;padding:8px 12px;border-bottom:1px solid #e8e8e8;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.bar input,.bar select{border:1px solid #d9d9d9;border-radius:6px;padding:6px 10px;font-size:13px;outline:none}
.bar input{flex:1;min-width:120px}
.bar input:focus,.bar select:focus{border-color:#1f6feb}
.bar button{border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;background:#eef2ff;color:#1f6feb;font-weight:500}
.bar button.on{background:#1f6feb;color:#fff}
.list{padding:8px 12px 40px}
.row{background:#fff;border-radius:10px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.row .head{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:8px}
.row .head .namewrap{display:flex;flex-direction:column;flex:1;min-width:0;line-height:1.2}
.row .head .name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .head .name.alias{color:#1565c0}
.row .head .nsub{font-size:10px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .head .tag{font-size:9px;color:#fff;background:#1565c0;border-radius:3px;padding:1px 4px;margin-left:4px;vertical-align:middle}
.row .head .area{font-size:11px;color:#888;background:#f0f0f0;padding:2px 6px;border-radius:4px;white-space:nowrap}
.row .head .rate{font-size:13px;font-weight:700;color:#e8590c;white-space:nowrap}
.row .head .nums{font-size:11px;color:#888;white-space:nowrap}
.row .head .arrow{color:#bbb;transition:transform .2s;font-size:12px}
.row.open .arrow{transform:rotate(90deg)}
.detail{display:none;padding:0 14px 14px;border-top:1px solid #f0f0f0}
.row.open .detail{display:block}
.detail .info{font-size:12px;color:#666;line-height:1.8;margin-top:10px}
.detail .info b{color:#333;font-weight:500}
.stat-box{display:flex;gap:8px;margin:10px 0}
.stat-box .stat{flex:1;background:#f8f9fc;border-radius:8px;padding:8px;text-align:center}
.stat-box .stat .n{font-size:18px;font-weight:700}
.stat-box .stat .l{font-size:10px;color:#888;margin-top:2px}
.stat-box .stat.sold .n{color:#e8590c}
.stat-box .stat.unsold .n{color:#1f6feb}
.stat-box .stat.total .n{color:#333}
.buildings{margin-top:6px}
.bld{margin-bottom:8px;border:1px solid #eee;border-radius:8px;overflow:hidden}
.bld .bhead{background:#f8f9fc;padding:8px 10px;font-size:13px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.bld .bhead .cnt{font-size:11px;color:#888;font-weight:400}
.bld .bbody{display:none;padding:8px 10px}
.bld.open .bbody{display:block}
.floor{display:flex;align-items:center;gap:4px;margin-bottom:3px;flex-wrap:wrap}
.bld .more{text-align:center;font-size:12px;color:#1f6feb;padding:6px 0;cursor:pointer;border-top:1px dashed #eee;margin-top:4px}
.bld .more:active{background:#f0f5ff}
.floor .fl{font-size:10px;color:#999;width:28px;text-align:right;flex-shrink:0}
.unit{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:46px;height:38px;border-radius:4px;font-size:10px;color:#fff;cursor:pointer;position:relative;margin:1px;line-height:1.15;padding:1px 0}
.unit .un{font-weight:700;font-size:11px}
.unit .ua{font-size:8px;opacity:.92;transform:scale(.94);white-space:nowrap}
.unit[data-s="2"],.unit[data-s="4"]{background:#52c41a}
.unit[data-s="5"]{background:#e8590c}
.unit[data-s="6"]{background:#868e96}
.unit[data-s="1"],.unit[data-s="3"]{background:#dee2e6;color:#888}
.unit[data-s="0"],.unit:not([data-s]){background:#dee2e6;color:#888}
.unit-pop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:100;align-items:center;justify-content:center}
.unit-pop.show{display:flex}
.unit-pop-box{background:#fff;border-radius:12px;padding:18px 20px 14px;max-width:320px;width:84%;position:relative;box-shadow:0 10px 40px rgba(0,0,0,.25)}
.unit-pop-close{position:absolute;top:6px;right:12px;font-size:22px;color:#bbb;cursor:pointer;line-height:1}
.unit-pop .ttl{font-size:18px;font-weight:700;margin-bottom:10px;padding-right:20px}
.unit-pop .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.unit-pop .row:last-child{border-bottom:none}
.unit-pop .row .k{color:#888}
.unit-pop .row .v{font-weight:600}
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:10px;color:#888;margin:6px 0 2px}
.legend span{display:inline-flex;align-items:center;gap:3px}
.legend i{width:10px;height:10px;border-radius:2px;display:inline-block}
.loading{text-align:center;padding:20px;color:#999;font-size:13px}
.err{color:#e03131;font-size:12px;padding:8px 0}
.empty{text-align:center;padding:40px 20px;color:#999}
.note{font-size:11px;color:#aaa;text-align:center;padding:8px}
.bnames{display:flex;flex-direction:column;line-height:1.25;min-width:0}
.bproj{font-size:13px;font-weight:600;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.bbn{font-size:10px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.infobn{color:#1565c0;font-weight:600}
.src{font-size:10px;color:#aaa;font-weight:400}
.subrow{border-top:1px solid #f0f0f0}
.subrow .shead{display:flex;align-items:center;gap:8px;padding:10px 14px 10px 26px;cursor:pointer;background:#fafbfc}
.subrow .shead:active{background:#f0f3f8}
.subrow .sname{font-size:13px;flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.subrow .snums{font-size:11px;color:#e8590c;font-weight:700;white-space:nowrap}
.subrow .sarrow{color:#bbb;font-size:11px;transition:transform .2s}
.subrow.open .sarrow{transform:rotate(90deg)}
.subrow .sdetail{display:none;padding:0 14px 10px 26px}
.subrow.open .sdetail{display:block}
.subrow .detail{padding:0}
.seg{display:inline-flex;border:1px solid #d9d9d9;border-radius:6px;overflow:hidden}
.seg button{border:none;background:#fff;padding:6px 12px;font-size:13px;cursor:pointer;color:#555}
.seg button.on{background:#1f6feb;color:#fff}
#map{display:none;height:calc(100vh - 132px);width:100%;background:#eaeaea;position:relative}
body.map #list{display:none}
body.map #map{display:block}
.maplabel{font-size:11px;font-weight:600;color:#1565c0;background:rgba(255,255,255,.9);border:1px solid #cfe3ff;padding:1px 4px;border-radius:3px;white-space:nowrap;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.map-namebtn{position:absolute;z-index:600;right:10px;bottom:18px;background:#fff;border:1px solid #ddd;border-radius:6px;padding:6px 12px;font-size:13px;box-shadow:0 2px 6px rgba(0,0,0,.2);cursor:pointer}
.map-namebtn.on{background:#1f6feb;color:#fff}
.map-hint{position:absolute;z-index:600;left:10px;bottom:16px;background:rgba(255,255,255,.92);border:1px solid #eee;border-radius:6px;padding:5px 9px;font-size:11px;color:#666;box-shadow:0 2px 6px rgba(0,0,0,.18);max-width:62vw;line-height:1.5}
.map-hint b{color:#e8590c}
</style>
<link rel="stylesheet" href="leaflet.css" />
</head>
<body>
<header>
  <h1>花都区新盘销控表</h1>
  <div class="sub" id="updated">加载中…</div>
</header>
<div class="bar">
  <input id="q" placeholder="搜索楼盘名 / 开发商…" />
  <select id="areaFilter"><option value="">全部板块</option></select>
  <span class="seg">
    <button id="viewList" class="on" onclick="showView('list')">列表</button>
    <button id="viewMap" onclick="showView('map')">地图</button>
  </span>
  <button id="refresh" class="on">刷新</button>
</div>
<div class="list" id="list">
  <div class="loading">正在加载实时数据…</div>
</div>
<div id="map"><button id="labelToggle" class="map-namebtn" onclick="toggleLabels()">名称</button><div class="map-hint">标记 <b>≈</b> 表示该小区位置为<b>街道级近似</b>（原数据地址只到街道），已尽量分散展示；精确坐标待校准。</div></div>
<div class="note">数据来源：广州市住建局「阳光家缘」 · 仅供参考</div>

<script src="leaflet.js"></script>
<script>
let DATA = null;
let filtered = [];
let GROUPS = [];
let ALIASES = {};
let ALIAS_KEYS = [];

// 根据楼盘名匹配推广名/备案名对照（按前缀长度降序匹配）
function aliasOf(name){
  if(!name) return null;
  for(const k of ALIAS_KEYS){
    if(name.indexOf(k) === 0) return ALIASES[k];
  }
  return null;
}

// 状态码：2/4=可售(绿), 5=已售(橙), 6=冻结(灰), 1/3=不可售(浅灰)
function statusText(s){
  const m={2:'可售',4:'可售',5:'已售',6:'冻结',1:'不可售',3:'不可售'};
  return m[s]||'未知';
}

function inferStatus(u){
  // 如果 status 缺失，尝试从 pledgeStatus/closed 推断
  if(u.status!=null) return u.status;
  if(u.closed) return 6;
  if(u.pledgeStatus) return 4;
  return 2;
}

async function loadData(){
  try{
    // 同目录 data.json
    const r = await fetch('data.json?_='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    DATA = await r.json();
    // 推广名/备案名对照表（独立文件，便于补充）
    try{
      const ar = await fetch('aliases.json?_='+Date.now());
      if(ar.ok){
        const aj = await ar.json();
        ALIASES = aj || {};
        delete ALIASES._comment;
        ALIAS_KEYS = Object.keys(ALIASES).sort((a,b)=>b.length-a.length);
      }
    }catch(e){ /* 对照表缺失不影响主功能 */ }
    document.getElementById('updated').textContent = '更新于 '+DATA.updated+' · 共 '+DATA.count+' 个楼盘';
    MAP_DIRTY = true;
    buildAreaFilter();
    render();
  }catch(e){
    document.getElementById('list').innerHTML = '<div class="err">数据加载失败：'+e.message+'<br>请稍后刷新页面重试。</div>';
  }
}

function buildAreaFilter(){
  const areas = [...new Set(DATA.projects.map(p=>p.area).filter(Boolean))].sort();
  const sel = document.getElementById('areaFilter');
  areas.forEach(a=>{
    const o=document.createElement('option');
    o.value=a; o.textContent=a;
    sel.appendChild(o);
  });
}

function devPrefix(name){
  if(!name) return name;
  let n = name;
  n = n.replace(/[（(][^）)]*[）)]/g, '').trim();          // 去括号内
  n = n.replace(/自编号[:：][^\s]*/, '')                    // 自编号：6#
       .replace(/自编[^\s]*/, '')                           // 自编4栋
       .replace(/住宅楼.*$/, '')
       .replace(/住宅.*$/, '')                             // 住宅（兜底）
       .replace(/商业.*$/, '')
       .replace(/、.*$/, '')
       .trim();
  n = n.replace(/\s*[0-9]+[栋号楼]*.*$/, '')                // 末尾 18 栋 / 11 / 1栋
       .replace(/[0-9]+号楼.*$/, '')
       .trim();
  n = n.replace(/[.\s]+$/, '');
  return n ? n : name;
}

function projStats(p){
  const sum = (p.detail && p.detail.summary) || {};
  const sold = sum.totalSaleNum || 0;
  const unsold = sum.totalNosoldNum || 0;
  const total = sum.allowPresellNum || (sold+unsold) || 0;
  return {sold, unsold, total, rate: total>0 ? (sold/total*100).toFixed(1) : '0.0'};
}

function buildGroups(list){
  const map = {};
  list.forEach((p, i)=>{
    const key = devPrefix(p.name);
    if(!map[key]) map[key] = {prefix:key, members:[], idxs:[], area:p.area||''};
    map[key].members.push(p);
    map[key].idxs.push(i);
    if(!map[key].area && p.area) map[key].area = p.area;
  });
  return Object.keys(map).sort().map(k=>{
    const g = map[k];
    const al = aliasOf(g.prefix);
    let sold=0, unsold=0, total=0;
    g.members.forEach(p=>{
      const s = projStats(p);
      sold+=s.sold; unsold+=s.unsold; total+=s.total;
    });
    g.alias = al;
    g.sold=sold; g.unsold=unsold; g.total=total;
    g.rate = total>0 ? (sold/total*100).toFixed(1) : '0.0';
    return g;
  });
}

function render(){
  const q = document.getElementById('q').value.trim().toLowerCase();
  const af = document.getElementById('areaFilter').value;
  filtered = DATA.projects.filter(p=>{
    if(af && p.area!==af) return false;
    if(q){
      const al = aliasOf(p.name);
      const hay = (p.name+' '+(p.developer||'')+' '+(al?al.alias:'')+' '+(al&&al.filing?al.filing:'')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  GROUPS = buildGroups(filtered);
  const el = document.getElementById('list');
  if(GROUPS.length===0){
    el.innerHTML = '<div class="empty">没有匹配的楼盘</div>';
    return;
  }
  el.innerHTML = GROUPS.map((g,gi)=>renderGroupRow(g,gi)).join('');
}

function renderGroupRow(g, gi){
  const title = g.alias ? g.alias.alias : g.prefix;
  const isAlias = !!g.alias;
  return `<div class="row group" data-gi="${gi}">
    <div class="head" onclick="toggleGroup(${gi})">
      <span class="namewrap">
        <span class="name${isAlias?' alias':''}">${esc(title)}${isAlias?'<span class="tag">推广</span>':''}</span>
        ${isAlias?`<span class="nsub">阳光家缘：${esc(g.prefix)}</span>`:''}
        ${g.members.length>1?`<span class="nsub">${g.members.length} 个预售证/楼栋</span>`:''}
      </span>
      <span class="area">${esc(g.area||'')}</span>
      <span class="rate">${g.rate}%</span>
      <span class="nums">售${g.sold}/未${g.unsold}</span>
      <span class="arrow">▶</span>
    </div>
    <div class="detail" id="g${gi}"></div>
  </div>`;
}

function toggleGroup(gi){
  const g = GROUPS[gi];
  const row = document.querySelector(`.row.group[data-gi="${gi}"]`);
  if(!row) return;
  const open = row.classList.toggle('open');
  const el = document.getElementById('g'+gi);
  if(open){
    el.innerHTML = g.members.map((p,mi)=>{
      const fi = g.idxs[mi];
      const st = projStats(p);
      return `<div class="subrow" data-fi="${fi}">
        <div class="shead" onclick="toggleProj(${gi},${mi})">
          <span class="sname">${esc(p.name)}</span>
          <span class="snums">${st.rate}%</span>
          <span class="sarrow">▶</span>
        </div>
        <div class="sdetail" id="s${gi}_${mi}"></div>
      </div>`;
    }).join('');
  }
}

function toggleProj(gi, mi){
  const g = GROUPS[gi];
  const fi = g.idxs[mi];
  const row = document.querySelector('.subrow[data-fi="'+fi+'"]');
  const subEl = document.getElementById('s'+gi+'_'+mi);
  if(!subEl) return;
  // .open 必须加在父级 .subrow 上，CSS 规则 .subrow.open .sdetail 才生效
  const open = row ? row.classList.toggle('open') : subEl.classList.toggle('open');
  if(open) renderDetail(fi, 's'+gi+'_'+mi);
}

function renderDetail(idx, targetId){
  const p = filtered[idx];
  const el = document.getElementById(targetId || ('d'+idx));
  const d = p.detail;
  const al = aliasOf(p.name);
  if(!d){
    el.innerHTML = '<div class="err">该项目实时数据获取失败</div>';
    return;
  }
  const sum = d.summary || {};
  const sold = sum.totalSaleNum || 0;
  const unsold = sum.totalNosoldNum || 0;
  const total = sum.allowPresellNum || (sold+unsold) || 0;
  const info = d.info || {};
  const blds = d.buildings || [];
  el.innerHTML = `
    <div class="info">
      ${al?`<b>推广名：</b><span class="infobn">${esc(al.alias)}</span><br>`:''}
      <b>阳光家缘名称：</b>${esc(p.name)}<br>
      ${al&&al.filing?`<b>备案名：</b><span class="infobn">${esc(al.filing)}</span>${al.src?` <span class="src">(${esc(al.src)})</span>`:''}<br>`:''}
      <b>开发商：</b>${esc(info.developer||p.developer||'-')}<br>
      <b>预售证：</b>${esc(info.preSellNo||p.presell||'-')}<br>
      <b>地址：</b>${esc(info.pjAddress||p.address||'-')}<br>
      ${p.geo_approx?`<b style="color:#e8590c">位置：</b><span style="color:#e8590c">近似（街道级），精确坐标待校准 ≈</span><br>`:''}
      <b>总面积：</b>${esc(info.totalBuildingArea||'-')}㎡
    </div>
    <div class="stat-box">
      <div class="stat sold"><div class="n">${sold}</div><div class="l">已售</div></div>
      <div class="stat unsold"><div class="n">${unsold}</div><div class="l">未售</div></div>
      <div class="stat total"><div class="n">${total}</div><div class="l">总套数</div></div>
    </div>
    <div class="legend">
      <span><i style="background:#52c41a"></i>可售</span>
      <span><i style="background:#e8590c"></i>已售</span>
      <span><i style="background:#868e96"></i>冻结</span>
      <span><i style="background:#dee2e6"></i>不可售</span>
    </div>
    <div class="buildings">
      ${blds.length===0?'<div class="err">暂无楼栋销控数据</div>':
        blds.map((b,bi)=>`
        <div class="bld" id="b${idx}_${bi}">
          <div class="bhead" onclick="toggleBld(${idx},${bi})">
            <span class="bnames">
              <span class="bproj">${esc(p.name)}</span>
              <span class="bbn">备案楼栋：${esc(cleanBld(b.name)||'楼栋'+(bi+1))}</span>
            </span>
            <span class="cnt">${b.floors.reduce((s,f)=>s+f.units.length,0)}套 · ${b.floors.length}层</span>
          </div>
          <div class="bbody" id="bb${idx}_${bi}"></div>
        </div>
      `).join('')}
    </div>
  `;
  // 默认展开第一个楼栋
  if(blds.length>0) toggleBld(idx,0);
}

// 楼栋内单元按需懒加载；超大楼栋按楼层分页，避免一次性渲染数万 DOM 节点导致卡死
const FLOOR_PAGE = 22;

function floorsHTML(b, idx, bi, start){
  const end = Math.min(start + FLOOR_PAGE, b.floors.length);
  let h = '';
  for(let fi=start; fi<end; fi++){
    const f = b.floors[fi];
    h += '<div class="floor"><span class="fl">'+esc(f.floor)+'</span>'
       + f.units.map((u,ui)=>{
           const s = inferStatus(u);
           return '<span class="unit" data-s="'+s+'" onclick="showUnit('+idx+','+bi+','+fi+','+ui+')">'
             + '<span class="un">'+esc(u.unitNum||'')+'</span>'
             + '<span class="ua">'+esc(fmtArea(u.totalArea))+'㎡</span>'
             + '</span>';
         }).join('')
       + '</div>';
  }
  const left = b.floors.length - end;
  if(left > 0){
    h += '<div class="more" onclick="loadMoreFloors('+idx+','+bi+','+end+')">展开更多楼层（剩余 '+left+' 层）▾</div>';
  }
  return h;
}

function renderBldBody(b, idx, bi){
  return floorsHTML(b, idx, bi, 0);
}

function loadMoreFloors(idx, bi, start){
  const b = filtered[idx] && filtered[idx].detail && filtered[idx].detail.buildings[bi];
  const body = document.getElementById('bb'+idx+'_'+bi);
  if(!b || !body) return;
  const more = floorsHTML(b, idx, bi, start);
  const btn = body.querySelector('.more');
  if(btn) btn.outerHTML = more; else body.insertAdjacentHTML('beforeend', more);
}

function toggleBld(idx,bi){
  const wrap = document.getElementById('b'+idx+'_'+bi);
  if(!wrap) return;
  const open = wrap.classList.toggle('open');
  const body = document.getElementById('bb'+idx+'_'+bi);
  if(open && body && !body.dataset.loaded){
    const b = filtered[idx] && filtered[idx].detail && filtered[idx].detail.buildings[bi];
    if(b) body.innerHTML = renderBldBody(b, idx, bi);
    body.dataset.loaded = '1';
  }
}

function esc(s){
  if(s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtArea(a){
  if(a==null || a==='') return '';
  const n = parseFloat(a);
  return isNaN(n) ? String(a) : (Math.round(n*10)/10).toString();
}

// 清理楼栋名：去掉多余的空括号、首尾空白
function cleanBld(n){
  if(!n) return '';
  return String(n).replace(/\(\)/g,'').replace(/\s+/g,' ').trim();
}

function statusColor(s){
  const m={2:'#52c41a',4:'#52c41a',5:'#e8590c',6:'#868e96',1:'#adb5bd',3:'#adb5bd'};
  return m[s]||'#333';
}

function showUnit(idx,bi,fi,ui){
  const u = filtered[idx] && filtered[idx].detail
    && filtered[idx].detail.buildings[bi]
    && filtered[idx].detail.buildings[bi].floors[fi]
    && filtered[idx].detail.buildings[bi].floors[fi].units[ui];
  if(!u) return;
  const s = inferStatus(u);
  const body = document.getElementById('unitPopBody');
  body.innerHTML = `
    <div class="ttl">${esc(u.unitNum||'')}</div>
    <div class="row"><span class="k">状态</span><span class="v" style="color:${statusColor(s)}">${statusText(s)}</span></div>
    <div class="row"><span class="k">户型</span><span class="v">${esc(u.unitType||'-')}</span></div>
    <div class="row"><span class="k">建筑面积</span><span class="v">${esc(fmtArea(u.totalArea))} ㎡</span></div>
    <div class="row"><span class="k">套内面积</span><span class="v">${esc(fmtArea(u.inArea))} ㎡</span></div>
    <div class="row"><span class="k">功能</span><span class="v">${esc(u.houseFunction||'-')}</span></div>
  `;
  document.getElementById('unitPop').classList.add('show');
}

function hideUnit(){
  const el = document.getElementById('unitPop');
  if(el) el.classList.remove('show');
}

// ===== 地图 =====
let MAP = null;
let MARKERS = null;
let MAP_DIRTY = true;
let LABELS_ON = false;

function mapRateColor(rate){
  const r = parseFloat(rate)||0;
  if(r >= 80) return '#e8590c';   // 高去化 橙
  if(r >= 50) return '#f59f00';   // 中高 黄
  if(r >= 20) return '#1c7ed6';   // 中低 蓝
  return '#37b24d';               // 低 绿
}

function showView(v){
  const listBtn = document.getElementById('viewList');
  const mapBtn = document.getElementById('viewMap');
  if(v === 'map'){
    document.body.classList.add('map');
    listBtn.classList.remove('on');
    mapBtn.classList.add('on');
    if(!MAP) initMap();
    else setTimeout(()=>MAP.invalidateSize(), 60);
    if(MAP_DIRTY && MAP){ rebuildMarkers(); MAP_DIRTY = false; }
  } else {
    document.body.classList.remove('map');
    listBtn.classList.add('on');
    mapBtn.classList.remove('on');
  }
}

function initMap(){
  MAP = L.map('map', {zoomControl:true}).setView([23.42, 113.22], 12);
  // 高德地图瓦片（国内加载快，含中文标注），备选可用 OSM
  L.tileLayer('https://wprd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&style=7&x={x}&y={y}&z={z}',
    {subdomains:'1234', maxZoom:18, attribution:'© 高德地图'}).addTo(MAP);
  MARKERS = L.layerGroup().addTo(MAP);
  rebuildMarkers();
  MAP_DIRTY = false;
}

function rebuildMarkers(){
  if(!MAP || !MARKERS) return;
  MARKERS.clearLayers();
  const groups = buildGroups(DATA.projects);
  const bounds = [];
  groups.forEach((g)=>{
    const pts = g.members.map(p=>[p.lat, p.lng]).filter(x=>x[0] && x[1]);
    if(!pts.length) return;
    const lat = pts.reduce((s,x)=>s+x[0],0)/pts.length;
    const lng = pts.reduce((s,x)=>s+x[1],0)/pts.length;
    const title = g.alias ? g.alias.alias : g.prefix;
    const color = mapRateColor(g.rate);
    const approx = g.members.some(p=>p.geo_approx);
    const m = L.circleMarker([lat, lng], {
      radius: 7, color: '#fff', weight: 1.5, fillColor: color, fillOpacity: 0.95
    });
    const html =
      `<div style="min-width:160px">`
      + `<b style="color:${color};font-size:14px">${esc(title)}${approx?' <span style="color:#e8590c" title="位置为近似（街道级），精确坐标待校准">≈</span>':''}</b>`
      + (g.alias ? `<div style="color:#888;font-size:11px">阳光家缘：${esc(g.prefix)}</div>` : '')
      + `<div style="margin:4px 0">去化 <b>${g.rate}%</b> · 售${g.sold}/未${g.unsold}</div>`
      + `<div style="color:#666;font-size:11px">${g.members.length} 个预售证/楼栋</div>`
      + (approx ? `<div style="color:#e8590c;font-size:11px;margin-top:4px">⚠ 位置为近似（街道级），精确坐标待校准</div>` : '')
      + `<div style="margin-top:6px"><a href="#" onclick="openGroupFromMap('${esc(g.prefix)}');return false;">查看销控表 →</a></div>`
      + `</div>`;
    m.bindPopup(html);
    m.bindTooltip(esc(title), {permanent:false, direction:'top', className:'maplabel', opacity:1});
    m._gprefix = g.prefix;
    MARKERS.addLayer(m);
    bounds.push([lat, lng]);
  });
  if(bounds.length){
    const pct = (arr, p)=>{
      const s = arr.slice().sort((a,b)=>a-b);
      return s[Math.min(s.length-1, Math.max(0, Math.floor(s.length*p)))];
    };
    const lats = bounds.map(b=>b[0]);
    const lngs = bounds.map(b=>b[1]);
    MAP.fitBounds([[pct(lats,0.05), pct(lngs,0.05)], [pct(lats,0.95), pct(lngs,0.95)]], {padding:[30,30], maxZoom:13});
  }
  applyLabels();
}

function applyLabels(){
  if(!MAP || !MARKERS) return;
  MARKERS.eachLayer(m=>{
    const t = m.getTooltip(); if(!t) return;
    t.options.permanent = LABELS_ON;
    if(LABELS_ON) m.openTooltip(); else m.closeTooltip();
  });
}

function toggleLabels(){
  LABELS_ON = !LABELS_ON;
  document.getElementById('labelToggle').classList.toggle('on', LABELS_ON);
  applyLabels();
}

function openGroupFromMap(prefix){
  // 切回列表视图并展开对应小区
  document.getElementById('q').value = '';
  document.getElementById('areaFilter').value = '';
  showView('list');
  render();
  setTimeout(()=>{
    const gi = GROUPS.findIndex(g=>g.prefix===prefix);
    if(gi < 0) return;
    const row = document.querySelector(`.row.group[data-gi="${gi}"]`);
    if(row){
      if(!row.classList.contains('open')) toggleGroup(gi);
      row.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }, 80);
}

// 事件绑定
document.getElementById('q').addEventListener('input', render);
document.getElementById('areaFilter').addEventListener('change', render);
document.getElementById('refresh').addEventListener('click', ()=>{
  document.getElementById('list').innerHTML = '<div class="loading">正在重新加载…</div>';
  loadData();
});

// 启动
loadData();
</script>

    <div class="unit-pop-close" onclick="hideUnit()">×</div>
    <div id="unitPopBody"></div>
  </div>
</div>
